# Razzle V2 — Fly.io config for the API.
#
# Single-region deploy with a persistent volume for terminal.db + users.db.
# The Next.js frontend deploys separately (Vercel or a second Fly app).

app = "razzle-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.api"

[env]
  ENVIRONMENT = "production"
  RAZZLE_BASE_URL = "https://razzle.lol"

[mounts]
  source = "razzle_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[http_service.checks.health]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
