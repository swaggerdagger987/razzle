<style>
  .sr-page { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }
  .sr-header { text-align: center; margin-bottom: 24px; }
  .sr-header h1 { font-family: var(--font-display); font-size: 32px; color: var(--ink); margin: 0 0 4px; }
  .sr-header .sr-subtitle { font-family: var(--font-hand); font-size: 20px; color: var(--ink-light); }
  .sr-controls { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .sr-controls select { font-family: var(--font-mono); font-size: 13px; padding: 6px 10px; border: 2px solid var(--ink); border-radius: var(--radius-sm); background: var(--bg-card); }
  .sr-controls .pos-tabs { display: flex; gap: 4px; }
  .sr-controls .pos-tab { font-family: var(--font-mono); font-size: 12px; padding: 5px 12px; border: 2px solid var(--ink); border-radius: var(--radius-sm); background: var(--bg-card); cursor: pointer; font-weight: 700; }
  .sr-controls .pos-tab.active { background: var(--ink); color: var(--bg); }
  .sr-export { font-family: var(--font-mono); font-size: 12px; padding: 5px 14px; border: 2px solid var(--ink); border-radius: var(--radius-sm); background: var(--bg-card); cursor: pointer; font-weight: 700; }
  .sr-export:hover { background: var(--ink); color: var(--bg); }
  .sr-loading { text-align: center; font-family: var(--font-hand); font-size: 18px; color: var(--ink-light); padding: 60px 0; }

  .sr-card { background: var(--bg-card); border: 3px solid var(--ink); border-radius: var(--radius-sm); box-shadow: 4px 4px 0 var(--ink); overflow: hidden; }
  .sr-card-header { font-family: var(--font-display); font-size: 18px; padding: 10px 16px; background: var(--ink); color: var(--bg); }
  .sr-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
  .sr-table th { background: var(--bg); padding: 6px 8px; text-align: right; font-size: 11px; font-weight: 700; border-bottom: 2px solid var(--ink-faint); white-space: nowrap; }
  .sr-table th:first-child, .sr-table th:nth-child(2), .sr-table th:nth-child(3) { text-align: left; }
  .sr-table td { padding: 6px 8px; text-align: right; border-bottom: 2px dashed var(--border-dashed); }
  .sr-table td:first-child, .sr-table td:nth-child(2), .sr-table td:nth-child(3) { text-align: left; }
  .sr-table tbody tr:hover { background: var(--bg-warm); }
  .sr-rank { font-weight: 700; color: var(--ink-light); font-size: 11px; }
  .sr-pos-badge { font-size: 11px; font-weight: 700; padding: 1px 5px; border-radius: var(--radius-sm); color: var(--text-on-accent); }
  .sr-rate-badge { font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: var(--radius-sm); border: 2px solid; }
  .sr-rate-high { background: var(--semantic-green-light); color: var(--semantic-green); border-color: var(--semantic-green); }
  .sr-rate-mid { background: var(--yellow-light); color: var(--ink-medium); border-color: var(--ink-medium); }
  .sr-rate-low { background: var(--semantic-red-light); color: var(--semantic-red); border-color: var(--semantic-red); }
  .sr-type-chip { font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 1px 5px; border-radius: var(--radius-sm); background: var(--ink-faint); color: var(--ink); }
  .sr-bar-cell { width: 80px; }
  .sr-bar { height: 12px; border-radius: var(--radius-sm); background: var(--green); min-width: 2px; }
  .sr-empty { text-align: center; padding: 40px 16px; font-family: var(--font-hand); font-size: 16px; color: var(--ink-light); }

  @media (max-width: 768px) {
    .sr-page { padding: 16px 12px 40px; }
    .sr-header h1 { font-size: 24px; }
    .sr-bar-cell { width: 50px; }
  }
  @media (max-width: 480px) {
    .sr-page { padding: 12px 8px 32px; }
    .sr-header h1 { font-size: 20px; }
    .sr-header .sr-subtitle { font-size: 16px; }
    .sr-controls { gap: 8px; }
    .sr-controls .pos-tab { padding: 4px 8px; font-size: 11px; }
    .sr-table { font-size: 11px; }
    .sr-table th, .sr-table td { padding: 4px 5px; }
    .sr-bar-cell { width: 35px; }
    .sr-card-header { font-size: 14px; padding: 8px 12px; }
  }

  /* Dark mode */
  [data-theme="dark"] .sr-page { color: var(--ink); }
  [data-theme="dark"] .sr-header h1 { color: var(--ink); }
  [data-theme="dark"] .sr-subtitle { color: var(--ink-light); }
  [data-theme="dark"] .sr-table th { color: var(--ink); border-color: var(--ink-faint); }
  [data-theme="dark"] .sr-table td { color: var(--ink-medium); border-color: var(--ink-faint); }
  [data-theme="dark"] .sr-card-header { color: var(--bg); }
  [data-theme="dark"] .sr-controls .pos-tab { background: var(--bg-card); color: var(--ink); border-color: var(--ink-faint); }
  [data-theme="dark"] .sr-controls .pos-tab.active { background: var(--ink); color: var(--bg-card); }
  [data-theme="dark"] .sr-controls select { background: var(--bg-card); color: var(--ink); border-color: var(--ink-faint); }

<body>
<noscript><div style="text-align:center;padding:40px;font-family:Space Mono,monospace;color:#2d1f14;"><h2>Razzle needs JavaScript</h2><p>Enable JavaScript to use the fantasy football research lab.</p></div></noscript>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="site-header" data-page="successrate"></div>

<main class="sr-page" id="main-content">  <div class="sr-header">
    <h1>Success Rate</h1>
    <div class="sr-subtitle">who makes the most of every play?</div>
  </div>

  <div class="sr-controls">
    <select id="sr-season" aria-label="Season selector"></select>
    <div class="pos-tabs" role="tablist" aria-label="Position filter">
      <button class="pos-tab active" data-pos="" role="tab" aria-selected="true">ALL</button>
      <button class="pos-tab" data-pos="QB" role="tab" aria-selected="false">QB</button>
      <button class="pos-tab" data-pos="RB" role="tab" aria-selected="false">RB</button>
      <button class="pos-tab" data-pos="WR" role="tab" aria-selected="false">WR</button>
      <button class="pos-tab" data-pos="TE" role="tab" aria-selected="false">TE</button>
    </div>
    <button class="sr-export" onclick="exportPNG(this)">Export PNG</button>
  </div>

  <div id="sr-loading" class="sr-loading">calculating success rates...</div>
  <div id="sr-content" style="display:none;">
    <div class="sr-card">
      <div class="sr-card-header">Success Rate Rankings</div>

    </div>
  </div>

<script src="app.js" defer></script>
<script>
}

var _cs = getComputedStyle(document.documentElement);
const POS_COLORS = {
  QB: _cs.getPropertyValue("--pos-qb").trim() || "#5b7fff",
  RB: _cs.getPropertyValue("--pos-rb").trim() || "#2ec4b6",
  WR: _cs.getPropertyValue("--pos-wr").trim() || "#d97757",
  TE: _cs.getPropertyValue("--pos-te").trim() || "#8b5cf6"
};
let state = { season: null, position: "", data: null };

function initSeasons() {
  const sel = document.getElementById("sr-season");
  const _d = new Date(); const now = _d.getMonth() >= 8 ? _d.getFullYear() : _d.getFullYear() - 1;
  for (let y = now; y >= 2020; y--) {
    const opt = document.createElement("option");
    opt.value = y; opt.textContent = y;
    sel.appendChild(opt);
  }
  const _urlState = restorePageState({ season: '', position: '' });
  if (_urlState.season) sel.value = _urlState.season;
  if (_urlState.position) {
    state.position = _urlState.position.toUpperCase();
    document.querySelectorAll(".pos-tab").forEach(t => {
      t.classList.toggle("active", t.dataset.pos === state.position);
    });
  }
  state.season = parseInt(sel.value, 10) || 0;
  sel.addEventListener("change", () => { state.season = parseInt(sel.value, 10) || 0; updateURL(); loadData(); });
}

function updateURL() {
  savePageState({ season: state.season ? String(state.season) : '', position: state.position });
}

document.querySelectorAll(".pos-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".pos-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    state.position = tab.dataset.pos;
    updateURL();
    loadData();
  });
});

async function loadData() {
  document.getElementById("sr-loading").style.display = "";
  document.getElementById("sr-content").style.display = "none";
  let url = "/api/success-rate?season=" + state.season;
  if (state.position) url += "&position=" + state.position;
  try {
    state.data = await apiFetch(url);
    render();
  } catch (e) {
    document.getElementById("sr-loading").textContent = razzleError();
  }
}

function rateClass(r) {
  if (r >= 45) return "sr-rate-high";
  if (r >= 35) return "sr-rate-mid";
  return "sr-rate-low";
}

function render() {
  document.getElementById("sr-loading").style.display = "none";
  document.getElementById("sr-content").style.display = "";
  const players = state.data.players || [];
  const wrap = document.getElementById("sr-table-wrap");

  if (players.length === 0) {
    wrap.innerHTML = '<div class="sr-empty">no success rate data found for this filter</div>';
    return;
  }

  const maxSR = Math.max(...players.map(p => p.success_rate), 1);
  let html = '<table class="sr-table"><caption class="sr-only">Rushing success rate rankings</caption><thead><tr><th scope="col">#</th><th scope="col">Player</th><th scope="col">Pos</th><th scope="col">SR%</th><th scope="col">Type</th><th scope="col">Vol</th><th scope="col">PPG</th><th scope="col">YPC</th><th scope="col"></th></tr></thead><tbody>';

  players.forEach((p, i) => {
    const posColor = POS_COLORS[p.position] || "var(--ink-light)";
    const cls = rateClass(p.success_rate);
    const barPct = maxSR > 0 ? p.success_rate / maxSR * 100 : 0;
    const ypc = p.ypc !== null ? escapeHtml(String(p.ypc)) : "-";

    html += '<tr>';
    html += '<td class="sr-rank">' + (i + 1) + '</td>';
    html += '<td>' + escapeHtml(p.name) + ' <span style="color:var(--ink-light);font-size:11px;">' + escapeHtml(p.team) + '</span></td>';
    html += '<td><span class="sr-pos-badge" style="background:' + escapeHtml(posColor) + '">' + escapeHtml(p.position) + '</span></td>';
    html += '<td><span class="sr-rate-badge ' + cls + '">' + escapeHtml(String(p.success_rate)) + '%</span></td>';
    html += '<td><span class="sr-type-chip">' + escapeHtml(p.sr_type) + '</span></td>';
    html += '<td>' + escapeHtml(String(p.volume)) + '</td>';
    html += '<td>' + escapeHtml(String(p.ppg)) + '</td>';
    html += '<td>' + ypc + '</td>';
    html += '<td class="sr-bar-cell"><div class="sr-bar" style="width:' + barPct + '%"></div></td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function exportPNG(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Exporting...'; }
  const el = document.getElementById("main-content");
  loadHtml2Canvas().then(function(h2c) { return h2c(el, { backgroundColor: document.documentElement.dataset.theme === 'dark' ? '#2d1f14' : '#ede0cf', scale: 2 }); }).then(canvas => {
    const ctx = canvas.getContext("2d");
    if (typeof drawRazzleWatermark === 'function') { drawRazzleWatermark(ctx, canvas); }
    else { ctx.font = "600 24px Caveat, cursive"; ctx.fillStyle = (typeof getExportColors === 'function' ? getExportColors().watermark : (document.documentElement.dataset.theme === 'dark' ? 'rgba(237,224,207,0.18)' : 'rgba(45,31,20,0.13)')); ctx.fillText("razzle.lol", canvas.width - 220, canvas.height - 20); }
    const link = document.createElement("a");
    link.download = "razzle-success-rate.png";
    link.href = canvas.toDataURL();
    link.click();
  }).finally(function() { if (btn) { btn.disabled = false; btn.textContent = 'Export PNG'; } });
}

// Analytics
fetch("/api/analytics/pageview", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ page: "/successrate.html", referrer: document.referrer }) }).catch(() => {});

initSeasons();
loadData();
</script>
</body>
