<link rel="stylesheet" href="styles.css">
<style>
  .sk-page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .sk-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .sk-header h1 {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--ink);
    margin: 0 0 4px;
  }
  .sk-header .sk-subtitle {
    font-family: var(--font-hand);
    font-size: 20px;
    color: var(--ink-light);
  }
  .sk-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .sk-controls select {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 10px;
    border: 2px solid var(--ink);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
  }
  .sk-export {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 14px;
    border: 2px solid var(--ink);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    cursor: pointer;
    font-weight: 700;
  }
  .sk-export:hover { background: var(--ink); color: var(--bg); }
  .sk-loading {
    text-align: center;
    font-family: var(--font-hand);
    font-size: 18px;
    color: var(--ink-light);
    padding: 60px 0;
  }
  .sk-card {
    background: var(--bg-card);
    border: 3px solid var(--ink);
    border-radius: var(--radius-sm);
    box-shadow: 4px 4px 0 var(--ink);
    overflow: hidden;
  }
  .sk-card-header {
    font-family: var(--font-display);
    font-size: 18px;
    padding: 10px 16px;
    background: var(--ink);
    color: var(--bg);
  }
  .sk-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .sk-table th {
    background: var(--bg);
    padding: 6px 8px;
    text-align: right;
    font-size: 11px;
    font-weight: 700;
    border-bottom: 2px solid var(--ink-faint);
    white-space: nowrap;
  }
  .sk-table th:first-child, .sk-table th:nth-child(2), .sk-table th:nth-child(3), .sk-table th:nth-child(4) { text-align: left; }
  .sk-table td {
    padding: 6px 8px;
    text-align: right;
    border-bottom: 2px dashed var(--border-dashed);
  }
  .sk-table td:first-child, .sk-table td:nth-child(2), .sk-table td:nth-child(3), .sk-table td:nth-child(4) { text-align: left; }
  .sk-table tbody tr:hover { background: var(--bg-warm); }
  .sk-rank {
    font-weight: 700;
    color: var(--ink-light);
    font-size: 11px;
  }
  .sk-team-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: var(--radius-sm);
    background: var(--ink);
    color: var(--bg);
  }
  .sk-pos-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: var(--radius-sm);
    color: var(--text-on-accent);
  }
  .sk-corr-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: var(--radius-sm);
    border: 2px solid;
  }
  .sk-corr-high { background: var(--semantic-green-light); color: var(--semantic-green); border-color: var(--semantic-green); }
  .sk-corr-mid { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
  .sk-corr-low { background: var(--yellow-light); color: var(--ink-medium); border-color: var(--ink-medium); }
  .sk-corr-neg { background: var(--semantic-red-light); color: var(--semantic-red); border-color: var(--semantic-red); }
  .sk-corr-bar {
    display: inline-block;
    height: 8px;
    border-radius: var(--radius-sm);
    background: var(--green);
    vertical-align: middle;
    margin-left: 4px;
  }
  .sk-empty {
    text-align: center;
    font-family: var(--font-hand);
    font-size: 14px;
    color: var(--ink-light);
    padding: 30px 16px;
  }
  @media (max-width: 768px) {
    .sk-table { font-size: 11px; }
  }
  @media (max-width: 480px) {
    .sk-page { padding: 16px 8px 40px; }
    .sk-header h1 { font-size: 20px; }
    .sk-header .sk-subtitle { font-size: 16px; }
    .sk-controls { gap: 8px; }
    .sk-table { font-size: 11px; }
    .sk-table th, .sk-table td { padding: 4px 5px; }
    .sk-card-header { font-size: 14px; padding: 8px 12px; }
  }

<body>
<noscript><div style="text-align:center;padding:40px;font-family:Space Mono,monospace;color:#2d1f14;"><h2>Razzle needs JavaScript</h2><p>Enable JavaScript to use the fantasy football research lab.</p></div></noscript>
<a href="#main-content" class="skip-link">Skip to main content</a>

<div id="site-header" data-page="stacks"></div>

<main class="sk-page" id="main-content">
  <div class="sk-header">
    <h1>Stack Correlation Finder</h1>
    <div class="sk-subtitle">which QB + WR/TE pairs boom together</div>
  </div>

  <div class="sk-controls">
    <select id="skSeason" aria-label="Season"></select>
    <button class="sk-export" id="skExport">Export PNG</button>
  </div>

  <div id="skContent" style="overflow-x:auto">
    <div class="sk-loading">building stack combos...</div>
  </div>
</main>

<!-- FOOTER -->
<div id="site-footer"></div>

<script src="app.js" defer></script>
<script>
(function() {
  'use strict';


  function fmt(v, dec) {
    if (v === null || v === undefined) return '-';
    return Number(v).toFixed(dec === undefined ? 1 : dec);
  }

  var _cs = getComputedStyle(document.documentElement);
  var POS_COLORS = {
    QB: _cs.getPropertyValue('--pos-qb').trim() || '#5b7fff',
    RB: _cs.getPropertyValue('--pos-rb').trim() || '#2ec4b6',
    WR: _cs.getPropertyValue('--pos-wr').trim() || '#d97757',
    TE: _cs.getPropertyValue('--pos-te').trim() || '#8b5cf6'
  };

  /* ---- URL state (uses shared helpers from app.js) ---- */

  function corrClass(c) {
    if (c >= 0.6) return 'sk-corr-high';
    if (c >= 0.3) return 'sk-corr-mid';
    if (c >= 0) return 'sk-corr-low';
    return 'sk-corr-neg';
  }

  /* ---- Fetch ---- */
  function load() {
    var selSeason = document.getElementById('skSeason');
    var season = selSeason.value || '';
    savePageState({ season: season });

    var url = '/api/stacks';
    if (season) url += '?season=' + encodeURIComponent(season);

    document.getElementById('skContent').innerHTML = '<div class="sk-loading">' + razzleLoading() + '</div>';

    fetch(url).then(function(r) {
      if (!r.ok) throw new Error('API error');
      return r.json();
    }).then(function(data) {
      populateSeasons(data.season);
      render(data);
    }).catch(function() {
      document.getElementById('skContent').innerHTML = '<div class="panel-error">' + razzleError() + '<br><button onclick="location.reload()">retry</button></div>';
    });
  }

  function populateSeasons(current) {
    var sel = document.getElementById('skSeason');
    if (sel.options.length <= 1) {
      sel.innerHTML = '';
      var now = new Date();
      var latestSeason = now.getMonth() >= 8 ? now.getFullYear() : now.getFullYear() - 1;
      for (var y = latestSeason; y >= 2015; y--) {
        var opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === current) opt.selected = true;
        sel.appendChild(opt);
      }
    }
  }

  /* ---- Render ---- */
  function render(data) {
    var stacks = data.stacks || [];

    if (!stacks.length) {
      document.getElementById('skContent').innerHTML = '<div class="panel-empty">' + razzleEmpty() + '<span class="hint">try a different season</span></div>';
      return;
    }

    var html = '<div class="sk-card">';
    html += '<div class="sk-card-header">Best QB + WR/TE Stacks (' + escapeHtml(String(data.count)) + ' pairs)</div>';
    html += '<table class="sk-table"><caption class="sr-only">Best QB and receiver stack combinations by correlation</caption><thead><tr>';
    html += '<th scope="col">#</th><th scope="col">Team</th><th scope="col">QB</th><th scope="col">Receiver</th><th scope="col">Pos</th><th scope="col">Corr</th><th scope="col"></th><th scope="col">QB PPG</th><th scope="col">Rec PPG</th><th scope="col">Combo PPG</th><th scope="col">Games</th>';
    html += '</tr></thead><tbody>';

    for (var i = 0; i < stacks.length; i++) {
      var s = stacks[i];
      var posColor = POS_COLORS[s.receiver_pos] || 'var(--ink-light)';
      var barWidth = Math.max(0, Math.min(100, Math.round(s.correlation * 100)));

      html += '<tr>';
      html += '<td class="sk-rank">' + (i + 1) + '</td>';
      html += '<td><span class="sk-team-badge">' + escapeHtml(s.team) + '</span></td>';
      html += '<td style="font-weight:700">' + escapeHtml(s.qb_name) + '</td>';
      html += '<td style="font-weight:700">' + escapeHtml(s.receiver_name) + '</td>';
      html += '<td><span class="sk-pos-badge" style="background:' + posColor + '">' + escapeHtml(s.receiver_pos) + '</span></td>';
      html += '<td><span class="sk-corr-badge ' + corrClass(s.correlation) + '">' + escapeHtml(String(fmt(s.correlation, 3))) + '</span></td>';
      html += '<td><div class="sk-corr-bar" style="width:' + barWidth + 'px"></div></td>';
      html += '<td>' + escapeHtml(String(fmt(s.qb_ppg))) + '</td>';
      html += '<td>' + escapeHtml(String(fmt(s.receiver_ppg))) + '</td>';
      html += '<td style="font-weight:700">' + escapeHtml(String(fmt(s.combined_ppg))) + '</td>';
      html += '<td>' + escapeHtml(String(s.common_games)) + '</td>';
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    document.getElementById('skContent').innerHTML = html;
  }

  document.getElementById('skSeason').addEventListener('change', load);

  /* ---- PNG export ---- */
  document.getElementById('skExport').addEventListener('click', function() {
    var btn = this; btn.disabled = true; btn.textContent = 'Exporting...';
    var root = document.getElementById('main-content');
    loadHtml2Canvas().then(function(h2c) { return h2c(root, { backgroundColor: document.documentElement.dataset.theme === 'dark' ? '#2d1f14' : '#ede0cf', scale: 2 }); }).then(function(canvas) {
      var ctx = canvas.getContext('2d');
      ctx.font = "600 24px Caveat, cursive";
      ctx.fillStyle = document.documentElement.dataset.theme === 'dark' ? 'rgba(237,224,207,0.15)' : 'rgba(45,31,20,0.12)';
      ctx.fillText('razzle.lol', canvas.width - 130, canvas.height - 16);
      var link = document.createElement('a');
      link.download = 'razzle-stacks.png';
      link.href = canvas.toDataURL();
      link.click();
    }).finally(function() { btn.disabled = false; btn.textContent = 'Export PNG'; });
  });

  /* ---- Analytics ---- */
  fetch('/api/analytics/pageview', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ page: '/stacks.html', referrer: document.referrer || '' })
  }).catch(function() {});

  /* ---- Init from URL ---- */
  var init = restorePageState({ season: '' });
  if (init.season) {
    var sel = document.getElementById('skSeason');
    var opt = document.createElement('option');
    opt.value = init.season;
    opt.textContent = init.season;
    opt.selected = true;
    sel.appendChild(opt);
  }

  load();
})();
</script>
</body>
</html>
