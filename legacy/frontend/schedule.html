<style>

  /* Section headers */

  .sos-section-header.suppressed { background: var(--green-light); }
  .sos-section-header.inflated { background: var(--red-light); }
  
  .section-icon.suppressed { color: var(--green); }
  .section-icon.inflated { color: var(--red); }

  /* Delta badge */
  .sos-delta {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    border: 2px solid;
  }
  .sos-delta.hard { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .sos-delta.easy { background: var(--red-light); color: var(--red); border-color: var(--red); }

  /* Loading / Empty / Error */
  .sos-loading,

<body>
<noscript><div style="text-align:center;padding:40px;font-family:Space Mono,monospace;color:#2d1f14;"><h2>Razzle needs JavaScript</h2><p>Enable JavaScript to use the fantasy football research lab.</p></div></noscript>
<a href="#main-content" class="skip-link">Skip to main content</a>

<div id="site-header" data-page="schedule"></div>

<main class="sos-page" id="main-content">
  <div class="sos-header">
    <h1>Strength of Schedule</h1>
    <div class="sos-subtitle">who thrived against killers and who feasted on cupcakes</div>
  </div>

  <div class="sos-controls">
    <div class="sos-pos-tabs" id="pos-tabs" role="tablist" aria-label="Position filter">
      <button class="sos-pos-tab active" data-pos="" aria-label="All positions">All</button>
      <button class="sos-pos-tab" data-pos="QB" aria-label="Quarterbacks">QB</button>
      <button class="sos-pos-tab" data-pos="RB" aria-label="Running Backs">RB</button>
      <button class="sos-pos-tab" data-pos="WR" aria-label="Wide Receivers">WR</button>
      <button class="sos-pos-tab" data-pos="TE" aria-label="Tight Ends">TE</button>
    </div>
    <div class="sos-scoring-tabs" id="scoring-tabs">
      <button class="sos-scoring-tab active" data-scoring="ppr">PPR</button>
      <button class="sos-scoring-tab" data-scoring="half_ppr">Half</button>
      <button class="sos-scoring-tab" data-scoring="std">Std</button>
    </div>
    <select class="sos-select" id="season-select" title="Season" aria-label="Season"></select>
  </div>

  <div class="sos-actions">
    <button class="btn-chunky" id="export-btn" title="Export as PNG">Export PNG</button>
  </div>

  <div id="sos-body" role="status" aria-live="polite" style="overflow-x:auto">
    <div class="sos-loading" id="sos-loading">scouting the schedule...</div>
  </div>
</main>

<!-- Watermark -->
<div style="position:fixed; bottom:10px; right:14px; font-family:var(--font-hand); font-size:14px; color:var(--ink-light); opacity:0.7; pointer-events:none; z-index:999;">razzle.lol</div>

<!-- FOOTER -->
<div id="site-footer"></div>

<script src="app.js" defer></script>
<script>
(function() {
  'use strict';


  function fmt(v, dec) {
    if (v === null || v === undefined) return '-';
    return Number(v).toFixed(dec === undefined ? 1 : dec);
  }

  var currentPosition = '';
  var currentScoring = 'ppr';
  var currentData = null;

  // Restore URL state
  var urlState = restorePageState({pos: '', season: '', scoring: 'ppr'});
  if (urlState.pos) currentPosition = urlState.pos;
  if (urlState.scoring && ['ppr','half_ppr','std'].indexOf(urlState.scoring) !== -1) currentScoring = urlState.scoring;

  // Sync UI from URL state
  if (currentPosition) {
    document.querySelectorAll('.sos-pos-tab').forEach(function(t) {
      t.classList.toggle('active', (t.getAttribute('data-pos') || '') === currentPosition);
    });
  }
  document.querySelectorAll('.sos-scoring-tab').forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('data-scoring') === currentScoring);
  });

  function _saveState() {
    savePageState({ pos: currentPosition, season: document.getElementById('season-select').value, scoring: currentScoring });
  }

  // Sort state per section
  var sortState = {
    schedule_suppressed: { col: 'sos_delta', dir: -1 },
    schedule_inflated: { col: 'sos_delta', dir: 1 }
  };

  function gradeClass(grade) {
    if (!grade) return 'grade-f';
    var g = grade.charAt(0);
    if (g === 'A') return grade === 'A+' ? 'grade-aplus' : 'grade-a';
    if (g === 'B') return 'grade-b';
    if (g === 'C') return 'grade-c';
    if (g === 'D') return 'grade-d';
    return 'grade-f';
  }

  // Suppressed columns (hardest schedule)
  var SUPPRESSED_COLUMNS = [
    { key: 'name', label: 'Player', tip: '' },
    { key: 'ppg', label: 'PPG', tip: 'Fantasy points per game (PPR)' },
    { key: 'grade', label: 'SOS', tip: 'Strength of schedule grade (A+ = hardest schedule faced)' },
    { key: 'sos_rank', label: 'Rank', tip: 'Schedule difficulty rank (1 = hardest schedule)' },
    { key: 'avg_opp_ppg', label: 'Opp PPG', tip: 'Average PPG allowed by opponents faced at this position — lower = tougher schedule' },
    { key: 'sos_delta', label: 'Delta', tip: 'Schedule difficulty delta — positive = harder than average, negative = easier than average' },
    { key: 'games', label: 'GP', hide: true, tip: 'Games played' },
    { key: 'annotation', label: '', hide: true, nosort: true, tip: '' }
  ];

  // Inflated columns (easiest schedule)
  var INFLATED_COLUMNS = [
    { key: 'name', label: 'Player', tip: '' },
    { key: 'ppg', label: 'PPG', tip: 'Fantasy points per game (PPR)' },
    { key: 'grade', label: 'SOS', tip: 'Strength of schedule grade (F = easiest schedule faced)' },
    { key: 'sos_rank', label: 'Rank', tip: 'Schedule difficulty rank (higher = easier schedule)' },
    { key: 'avg_opp_ppg', label: 'Opp PPG', tip: 'Average PPG allowed by opponents faced at this position — higher = softer schedule' },
    { key: 'sos_delta', label: 'Delta', tip: 'Schedule difficulty delta — negative = easier than average' },
    { key: 'games', label: 'GP', hide: true, tip: 'Games played' },
    { key: 'annotation', label: '', hide: true, nosort: true, tip: '' }
  ];

  function getColumns(section) {
    return section === 'schedule_suppressed' ? SUPPRESSED_COLUMNS : INFLATED_COLUMNS;
  }

  function buildPlayerRow(p, section) {
    var pos = (p.position || 'RB').toLowerCase();
    var cols = getColumns(section);

    var html = '<tr data-pid="' + escapeHtml(p.player_id) + '">';

    cols.forEach(function(col) {
      var classes = [];
      if (col.key !== 'name') classes.push('center');
      if (col.hide) classes.push('hide-mobile');

      if (col.key === 'name') {
        html += '<td>';
        html += '<div class="sos-player-cell">';
        if (p.headshot_url) {
          html += '<img class="sos-headshot" src="' + escapeHtml(p.headshot_url) + '" alt="Player headshot" loading="lazy" onerror="this.onerror=null;this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><circle cx=%2220%22 cy=%2220%22 r=%2220%22 fill=%22%23d97757%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2216%22>?</text></svg>\'">';
        }
        html += '<div class="sos-player-info">';
        html += '<div class="sos-player-name">' + escapeHtml(p.name) + '</div>';
        html += '<div class="sos-player-meta">';
        html += '<span class="sos-pos-badge ' + pos + '">' + escapeHtml(p.position) + '</span>';
        html += '<span class="sos-team-label">' + escapeHtml(p.team) + '</span>';
        html += '</div></div></div>';
        html += '</td>';
      } else if (col.key === 'grade') {
        var g = p.grade || 'C';
        html += '<td class="' + classes.join(' ') + '">';
        html += '<span class="sos-grade-badge ' + gradeClass(g) + '">' + escapeHtml(g) + '</span>';
        html += '</td>';
      } else if (col.key === 'ppg') {
        html += '<td class="' + classes.join(' ') + '" style="font-weight:700;">' + fmt(p.ppg) + '</td>';
      } else if (col.key === 'sos_rank') {
        html += '<td class="' + classes.join(' ') + '">#' + escapeHtml(String(p.sos_rank)) + '</td>';
      } else if (col.key === 'avg_opp_ppg') {
        html += '<td class="' + classes.join(' ') + '">' + fmt(p.avg_opp_ppg) + '</td>';
      } else if (col.key === 'sos_delta') {
        var d = p.sos_delta || 0;
        var cls = d > 0 ? 'hard' : 'easy';
        var sign = d > 0 ? '+' : '';
        html += '<td class="' + classes.join(' ') + '">';
        html += '<span class="sos-delta ' + cls + '">' + sign + fmt(d) + '</span>';
        html += '</td>';
      } else if (col.key === 'annotation') {
        html += '<td class="' + classes.join(' ') + '"><span class="sos-annotation">' + escapeHtml(p.annotation || '') + '</span></td>';
      } else {
        var val = p[col.key];
        html += '<td class="' + classes.join(' ') + '">' + (val !== null && val !== undefined ? escapeHtml(String(val)) : '-') + '</td>';
      }
    });

    html += '</tr>';
    return html;
  }

  function buildTableHeader(section) {
    var state = sortState[section];
    var cols = getColumns(section);
    var html = '<thead><tr>';
    cols.forEach(function(col) {
      var classes = [];
      if (col.key !== 'name') classes.push('center');
      if (col.hide) classes.push('hide-mobile');
      var sorted = state.col === col.key;
      if (sorted) classes.push('sorted');
      var arrow = sorted ? (state.dir === 1 ? ' &#9650;' : ' &#9660;') : '';
      var sortAttr = col.nosort ? '' : ' data-sort="' + col.key + '" data-section="' + section + '"';
      var tipAttr = col.tip ? ' title="' + escapeHtml(col.tip) + '"' : '';
      html += '<th class="' + classes.join(' ') + '"' + sortAttr + tipAttr + '>' + col.label + '<span class="sort-arrow">' + arrow + '</span></th>';
    });
    html += '</tr></thead>';
    return html;
  }

  function sortPlayers(players, col, dir) {
    return players.slice().sort(function(a, b) {
      var va = a[col], vb = b[col];
      if (va === null || va === undefined) va = -Infinity;
      if (vb === null || vb === undefined) vb = -Infinity;
      if (typeof va === 'string') return dir * va.localeCompare(vb);
      return dir * (vb - va);
    });
  }

  function buildTable(players, section) {
    if (!players || !players.length) {
      var label = section === 'schedule_suppressed' ? 'schedule-suppressed players' : 'schedule-inflated players';
      return '<div class="sos-empty">no ' + label + ' found for this filter</div>';
    }

    var isSuppressed = section === 'schedule_suppressed';
    var icon = isSuppressed ? '&#x1F6E1;' : '&#x1F36D;';
    var title = isSuppressed ? 'Schedule Suppressed' : 'Schedule Inflated';
    var subtitle = isSuppressed
      ? 'hardest schedules faced (opponents allowed fewest PPG at position)'
      : 'easiest schedules faced (opponents allowed most PPG at position)';
    var headerClass = isSuppressed ? 'suppressed' : 'inflated';

    var state = sortState[section];
    var sorted = sortPlayers(players, state.col, state.dir);

    var html = '<div class="sos-section">';
    html += '<div class="sos-section-header ' + headerClass + '">';
    html += '<span class="section-icon ' + headerClass + '">' + icon + '</span> ';
    html += title + ' <span style="font-family:var(--font-hand); font-size:16px; color:var(--ink-light); font-weight:500;">(' + players.length + ' players) — ' + subtitle + '</span>';
    html += '</div>';

    html += '<table class="sos-table" data-section="' + section + '"><caption class="sr-only">Strength of schedule rankings — ' + escapeHtml(title) + '</caption>';
    html += buildTableHeader(section);
    html += '<tbody>';
    sorted.forEach(function(p) {
      html += buildPlayerRow(p, section);
    });
    html += '</tbody></table>';
    html += '</div>';
    return html;
  }

  function render(data) {
    currentData = data;
    var body = document.getElementById('sos-body');

    if (!data || (!(data.schedule_suppressed || []).length && !(data.schedule_inflated || []).length)) {
      body.innerHTML = '<div class="sos-empty">no strength of schedule data found for this selection</div>';
      return;
    }

    var html = '';
    html += buildTable(data.schedule_suppressed, 'schedule_suppressed');
    html += buildTable(data.schedule_inflated, 'schedule_inflated');
    body.innerHTML = html;

    // Attach sort listeners
    body.querySelectorAll('th[data-sort]').forEach(function(th) {
      th.addEventListener('click', function() {
        var col = th.getAttribute('data-sort');
        var sec = th.getAttribute('data-section');
        if (sortState[sec].col === col) {
          sortState[sec].dir *= -1;
        } else {
          sortState[sec].col = col;
          sortState[sec].dir = -1;
        }
        render(currentData);
      });
    });

    // Attach row click
    body.querySelectorAll('tr[data-pid]').forEach(function(tr) {
      tr.addEventListener('click', function() {
        var pid = tr.getAttribute('data-pid');
        if (pid) window.location.href = '/player/' + encodeURIComponent(pid);
      });
    });
  }

  function loadData() {
    var body = document.getElementById('sos-body');
    body.innerHTML = '<div class="sos-loading">scouting the schedule...</div>';

    var seasonSel = document.getElementById('season-select');
    var season = seasonSel.value || '';
    var url = '/api/strength-of-schedule?limit=30';
    if (season) url += '&season=' + season;
    if (currentPosition) url += '&position=' + currentPosition;
    if (currentScoring !== 'ppr') url += '&scoring=' + currentScoring;

    fetch(url).then(function(resp) {
      if (!resp.ok) throw new Error('API error ' + resp.status);
      return resp.json();
    }).then(function(data) {
      // Populate season selector if needed
      var seasonSel = document.getElementById('season-select');
      if (seasonSel.options.length === 0 && data.available_seasons) {
        data.available_seasons.forEach(function(s) {
          var opt = document.createElement('option');
          opt.value = s;
          opt.textContent = s;
          seasonSel.appendChild(opt);
        });
        seasonSel.value = data.season;
      }
      render(data);
    }).catch(function(err) {
      body.innerHTML = '<div class="sos-error">' + razzleError() + '<br><button class="btn-chunky" onclick="location.reload()">retry</button></div>';
    });
  }

  // Position tab clicks
  document.getElementById('pos-tabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.sos-pos-tab');
    if (!tab) return;
    document.querySelectorAll('.sos-pos-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    currentPosition = tab.getAttribute('data-pos') || '';
    loadData();
    _saveState();
  });

  // Scoring format tab clicks
  document.getElementById('scoring-tabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.sos-scoring-tab');
    if (!tab) return;
    document.querySelectorAll('.sos-scoring-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    currentScoring = tab.getAttribute('data-scoring') || 'ppr';
    loadData();
    _saveState();
  });

  // Season change
  document.getElementById('season-select').addEventListener('change', function() {
    loadData();
    _saveState();
  });

  // Export PNG
  document.getElementById('export-btn').addEventListener('click', function() {
    var btn = this; btn.disabled = true; btn.textContent = 'Exporting...';
    var el = document.getElementById('main-content');
    loadHtml2Canvas().then(function(h2c) { return h2c(el, { backgroundColor: document.documentElement.dataset.theme === 'dark' ? '#2d1f14' : '#ede0cf', scale: 2 }); }).then(function(canvas) {
      var ctx = canvas.getContext('2d');
      ctx.font = '24px Caveat, cursive';
      ctx.fillStyle = document.documentElement.dataset.theme === 'dark' ? 'rgba(237,224,207,0.3)' : 'rgba(45,31,20,0.3)';
      ctx.textAlign = 'right';
      ctx.fillText('razzle.lol', canvas.width - 20, canvas.height - 16);

      var link = document.createElement('a');
      link.download = 'razzle-schedule-sos.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }).finally(function() { btn.disabled = false; btn.textContent = 'Export PNG'; });
  });

  // Analytics pageview
  fetch('/api/analytics/pageview', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ page: '/schedule.html', referrer: document.referrer || '' })
  }).catch(function() {});

  // Initial load — pass restored season so first fetch uses it
  if (urlState.season) {
    var _ss = document.getElementById('season-select');
    var _opt = document.createElement('option');
    _opt.value = urlState.season;
    _opt.textContent = urlState.season;
    _opt.selected = true;
    _ss.appendChild(_opt);
  }
  loadData();
})();
</script>
</body>
</html>
