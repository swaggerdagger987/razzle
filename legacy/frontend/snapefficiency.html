  .se-controls { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .se-controls select { font-family: var(--font-mono); font-size: 13px; padding: 6px 10px; border: 2px solid var(--ink); border-radius: var(--radius-sm); background: var(--bg-card); }

  .se-controls .pos-tab { font-family: var(--font-mono); font-size: 12px; padding: 5px 12px; border: 2px solid var(--ink); border-radius: var(--radius-sm); background: var(--bg-card); cursor: pointer; font-weight: 700; }
  .se-controls .pos-tab.active { background: var(--ink); color: var(--bg); }
  .se-export { font-family: var(--font-mono); font-size: 12px; padding: 5px 14px; border: 2px solid var(--ink); border-radius: var(--radius-sm); background: var(--bg-card); cursor: pointer; font-weight: 700; }
  .se-export:hover { background: var(--ink); color: var(--bg); }
  .se-loading { text-align: center; font-family: var(--font-hand); font-size: 18px; color: var(--ink-light); padding: 60px 0; }

  .se-card { background: var(--bg-card); border: 3px solid var(--ink); border-radius: var(--radius-sm); box-shadow: 4px 4px 0 var(--ink); overflow: hidden; }
  .se-card-header { font-family: var(--font-display); font-size: 18px; padding: 10px 16px; background: var(--ink); color: var(--bg); }
  .se-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
  .se-table th { background: var(--bg); padding: 6px 8px; text-align: right; font-size: 11px; font-weight: 700; border-bottom: 2px solid var(--ink-faint); white-space: nowrap; }
  .se-table th:first-child, .se-table th:nth-child(2), .se-table th:nth-child(3) { text-align: left; }
  .se-table td { padding: 6px 8px; text-align: right; border-bottom: 2px dashed var(--border-dashed); }
  .se-table td:first-child, .se-table td:nth-child(2), .se-table td:nth-child(3) { text-align: left; }
  .se-table tbody tr:hover { background: var(--bg-warm); }
  .se-rank { font-weight: 700; color: var(--ink-light); font-size: 11px; }
  .se-pos-badge { font-size: 11px; font-weight: 700; padding: 1px 5px; border-radius: var(--radius-sm); color: var(--text-on-accent); }
  .se-eff-badge { font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: var(--radius-sm); border: 2px solid; }
  .se-eff-elite { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
  .se-eff-high { background: var(--semantic-green-light); color: var(--semantic-green); border-color: var(--semantic-green); }
  .se-eff-mid { background: var(--yellow-light); color: var(--ink-medium); border-color: var(--ink-medium); }
  .se-eff-low { background: var(--semantic-red-light); color: var(--semantic-red); border-color: var(--semantic-red); }
  .se-bar-cell { width: 80px; }
  .se-bar { height: 12px; border-radius: var(--radius-sm); background: var(--green); min-width: 2px; }
  /* .se-empty removed — uses .panel-empty from styles.css */

  @media (max-width: 768px) {
    .se-page { padding: 16px 12px 40px; }
    .se-header h1 { font-size: 24px; }
    .se-bar-cell { width: 50px; }
  }
  @media (max-width: 480px) {
    .se-page { padding: 12px 8px 32px; }

    .se-table { font-size: 11px; }
    .se-table th, .se-table td { padding: 4px 5px; }
    .se-bar-cell { width: 35px; }
    .se-card-header { font-size: 14px; padding: 8px 12px; }

  /* Dark mode */
  [data-theme="dark"] .se-page { color: var(--ink); }

<body>

<script>
}

const POS_COLORS = getPosColors();
let state = { season: null, position: "", data: null };

function initSeasons() {
  const sel = document.getElementById("se-season");
  const _d = new Date(); const now = _d.getMonth() >= 8 ? _d.getFullYear() : _d.getFullYear() - 1;
  for (let y = now; y >= 2020; y--) {
    const opt = document.createElement("option");
    opt.value = y; opt.textContent = y;
    sel.appendChild(opt);
  }
  const _restored = restorePageState({ season: '', position: '' });
  if (_restored.season) sel.value = _restored.season;
  if (_restored.position) {
    state.position = _restored.position.toUpperCase();
    document.querySelectorAll(".pos-tab").forEach(t => {
      t.classList.toggle("active", t.dataset.pos === state.position);
    });
  }
  state.season = parseInt(sel.value, 10) || 0;
  sel.addEventListener("change", () => { state.season = parseInt(sel.value, 10) || 0; updateURL(); loadData(); });
}

function updateURL() {
  savePageState({ season: state.season || '', position: state.position });
}

document.querySelectorAll(".pos-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".pos-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    state.position = tab.dataset.pos;
    updateURL();
    loadData();
  });
});

async function loadData() {
  document.getElementById("se-loading").style.display = "";
  document.getElementById("se-content").style.display = "none";
  let url = "/api/snap-efficiency?season=" + state.season;
  if (state.position) url += "&position=" + state.position;
  try {
    state.data = await apiFetch(url);
    render();
  } catch (e) {
    document.getElementById("se-loading").style.display = "none";
    document.getElementById("se-content").style.display = "";
    document.getElementById("se-table-wrap").innerHTML = '<div class="panel-error">' + razzleError() + '<br><button class="btn-chunky" onclick="loadData()">retry</button></div>';
  }
}

function effClass(pps) {
  if (pps >= 0.5) return "se-eff-elite";
  if (pps >= 0.35) return "se-eff-high";
  if (pps >= 0.2) return "se-eff-mid";
  return "se-eff-low";
}

function render() {
  document.getElementById("se-loading").style.display = "none";
  document.getElementById("se-content").style.display = "";
  const players = state.data.players || [];
  const wrap = document.getElementById("se-table-wrap");

  if (players.length === 0) {
    wrap.innerHTML = '<div class="panel-empty">' + razzleEmpty() + '<span class="hint">try a different position or season</span></div>';
    return;
  }

  const maxPPS = Math.max(...players.map(p => p.pts_per_snap), 1);
  let html = '<table class="se-table"><caption class="sr-only">Snap efficiency rankings by fantasy points per snap</caption><thead><tr><th scope="col">#</th><th scope="col">Player</th><th scope="col">Pos</th><th scope="col">Pts/Snap</th><th scope="col">PPG</th><th scope="col">Snaps/G</th><th scope="col">Snaps</th><th scope="col">GP</th><th scope="col"></th></tr></thead><tbody>';

  players.forEach((p, i) => {
    const posColor = POS_COLORS[p.position] || "var(--ink-light)";
    const cls = effClass(p.pts_per_snap);
    const barPct = maxPPS > 0 ? p.pts_per_snap / maxPPS * 100 : 0;

    html += '<tr>';
    html += '<td class="se-rank">' + (i + 1) + '</td>';
    html += '<td>' + escapeHtml(p.name) + ' <span style="color:var(--ink-light);font-size:11px;">' + escapeHtml(p.team) + '</span></td>';
    html += '<td><span class="se-pos-badge" style="background:' + escapeHtml(posColor) + '">' + escapeHtml(p.position) + '</span></td>';
    html += '<td><span class="se-eff-badge ' + cls + '">' + escapeHtml(String(p.pts_per_snap)) + '</span></td>';
    html += '<td>' + escapeHtml(String(p.ppg)) + '</td>';
    html += '<td>' + escapeHtml(String(p.snaps_pg)) + '</td>';
    html += '<td>' + escapeHtml(String(p.snaps)) + '</td>';
    html += '<td>' + escapeHtml(String(p.games)) + '</td>';
    html += '<td class="se-bar-cell"><div class="se-bar" style="width:' + barPct + '%"></div></td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function exportPNG(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Exporting...'; }
  const el = document.getElementById("main-content");
  loadHtml2Canvas().then(function(h2c) { return h2c(el, { backgroundColor: document.documentElement.dataset.theme === 'dark' ? '#2d1f14' : '#ede0cf', scale: 2 }); }).then(canvas => {
    const ctx = canvas.getContext("2d");
    if (typeof drawRazzleWatermark === 'function') { drawRazzleWatermark(ctx, canvas); }
    else { ctx.font = "600 24px Caveat, cursive"; ctx.fillStyle = (typeof getExportColors === 'function' ? getExportColors().watermark : (document.documentElement.dataset.theme === 'dark' ? 'rgba(237,224,207,0.18)' : 'rgba(45,31,20,0.13)')); ctx.fillText("razzle.lol", canvas.width - 220, canvas.height - 20); }
    const link = document.createElement("a");
    link.download = "razzle-snap-efficiency.png";
    link.href = canvas.toDataURL();
    link.click();
  }).finally(function() { if (btn) { btn.disabled = false; btn.textContent = 'Export PNG'; } });
}

// Analytics
fetch("/api/analytics/pageview", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ page: "/snapefficiency.html", referrer: document.referrer }) }).catch(() => {});

initSeasons();
loadData();
</script>
