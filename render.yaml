services:
  - type: web
    name: razzle-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python adapters/nflverse_adapter.py --seasons 2024
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
