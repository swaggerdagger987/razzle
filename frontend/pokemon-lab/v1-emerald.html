<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v1 Emerald — Situation Room Pokemon Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* v1 Emerald — canon GBA palette: navy dialog, tan tiles, blue UI */
  body.pl-v1 { background: #5c83c6; }
  .pl-v1 .pl-battle-bg {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(204,225,255,0.18) 0%, rgba(92,131,198,0.05) 60%, rgba(255,220,140,0.22) 100%);
  }
  .pl-v1 .pl-dialog {
    background: #204578;
    border-color: #ede0cf;
    box-shadow:
      inset 0 0 0 3px #204578,
      inset 0 0 0 6px #ede0cf,
      inset 0 0 0 9px #204578,
      8px 8px 0 rgba(0,0,0,0.45);
    color: #fff;
  }
  .pl-v1 .pl-speaker { color: #ffd86b; }
  .pl-v1 .pl-caret { background: #ffd86b; }

  .pl-v1 .pl-action-menu {
    background: #204578;
    border-color: #ede0cf;
    box-shadow:
      inset 0 0 0 3px #204578,
      inset 0 0 0 6px #ede0cf,
      inset 0 0 0 9px #204578,
      8px 8px 0 rgba(0,0,0,0.45);
  }
  .pl-v1 .pl-action-btn {
    background: #ede0cf;
    color: #204578;
    border-color: #204578;
  }
  .pl-v1 .pl-action-btn:hover { background: #ffd86b; }

  /* Emerald-style arrow indicator */
  .pl-v1 .pl-action-btn::before {
    content: '▶';
    display: inline-block;
    margin-right: 6px;
    color: #d44040;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .pl-v1 .pl-action-btn:hover::before { opacity: 1; }
</style>
</head>
<body class="pl-v1">

<iframe src="../agents.html" class="pl-world-frame" title="walkaround world"></iframe>
<div class="pl-world-dim"></div>
<div class="pl-battle-bg"></div>

<div class="pl-version-badge">v1 · EMERALD</div>
<button type="button" class="pl-peek-btn" data-pl-peek>peek world</button>

<div class="pl-overlay">
  <div class="pl-stage">
    <div class="pl-sprite trainer bob">🧑‍🚀</div>
    <div class="pl-sprite opponent bob" data-pl-opponent-sprite>🐯</div>
  </div>

  <div class="pl-dialog-row">
    <div class="pl-dialog">
      <div class="pl-speaker" data-pl-speaker>RAZZLE — Chief of Staff</div>
      <div class="pl-text" data-pl-text>…</div>
      <span class="pl-caret" data-pl-caret></span>
      <form class="pl-ask-input" data-pl-ask-form style="display:none">
        <input type="text" placeholder="type your question, press enter" maxlength="140" />
        <button type="submit">ASK</button>
      </form>
      <div class="pl-hint">▼ click text to skip · space for next line</div>
    </div>

    <div class="pl-action-menu">
      <button type="button" class="pl-action-btn" data-pl-action="ask">ASK</button>
      <button type="button" class="pl-action-btn" data-pl-action="tools">TOOLS</button>
      <button type="button" class="pl-action-btn" data-pl-action="roster">ROSTER</button>
      <button type="button" class="pl-action-btn" data-pl-action="leave">LEAVE</button>
    </div>
  </div>
</div>

<div class="pl-roster">
  <button data-pl-agent-btn="razzle" class="active">RAZZLE</button>
  <button data-pl-agent-btn="hawkeye">HAWKEYE</button>
  <button data-pl-agent-btn="octo">OCTO</button>
  <button data-pl-agent-btn="dolphin">DR.D</button>
  <button data-pl-agent-btn="bones">BONES</button>
  <button data-pl-agent-btn="atlas">ATLAS</button>
</div>

<script src="engine.js"></script>
<script src="notes.js"></script>
<script>
  PokeBattle.init({ versionId: 'v1-emerald', agent: 'razzle' });
  PokeNotes.init('v1-emerald');
</script>
</body>
</html>
