<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ede0cf">
<title>Reset Password — Razzle</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Space+Mono:wght@400;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Space+Mono:wght@400;700&family=Caveat:wght@500;600;700&display=swap"></noscript>
<link rel="stylesheet" href="styles.css">
<style>
  .reset-page {
    max-width: 420px;
    margin: 80px auto 0;
    padding: 0 20px 60px;
    text-align: center;
  }
  .reset-card {
    background: var(--bg-card);
    border: 3px solid var(--ink);
    border-radius: 12px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 32px 24px;
  }
  .reset-card h1 {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--ink);
    margin: 0 0 8px;
  }
  .reset-card .reset-subtitle {
    font-family: var(--font-hand);
    font-size: 16px;
    color: var(--ink-light);
    margin-bottom: 20px;
  }
  .reset-form input {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-family: var(--font-mono);
    font-size: 14px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
  }
  .reset-form input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .reset-msg {
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 20px;
    margin-bottom: 12px;
  }
  .reset-msg.error { color: #c0392b; }
  .reset-msg.success { color: var(--ink); }
  .reset-link {
    display: inline-block;
    margin-top: 16px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
  }
  .reset-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<noscript><div style="text-align:center;padding:40px;font-family:Space Mono,monospace;color:#2d1f14;"><h2>Razzle needs JavaScript</h2><p>Enable JavaScript to use the fantasy football research lab.</p></div></noscript>
<main class="reset-page" id="main-content">
  <div class="reset-card">
    <h1>Reset Password</h1>
    <div class="reset-subtitle">choose a new password for your account</div>
    <form class="reset-form" id="resetForm">
      <input type="password" id="resetPassword" placeholder="New password (8+ chars)" required minlength="8" autocomplete="new-password" aria-label="New password">
      <input type="password" id="resetConfirm" placeholder="Confirm new password" required minlength="8" autocomplete="new-password" aria-label="Confirm new password">
      <div class="reset-msg" id="resetMsg" role="status"></div>
      <button type="submit" class="btn-chunky btn-primary" style="width:100%">Update Password</button>
    </form>
    <a href="/" class="reset-link">Back to Razzle</a>
  </div>
</main>

<script src="app.js"></script>
<script>
(function() {
  'use strict';

  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var msgEl = document.getElementById('resetMsg');
  var form = document.getElementById('resetForm');

  if (!token) {
    msgEl.className = 'reset-msg error';
    msgEl.textContent = 'Invalid reset link. Please request a new one.';
    form.style.display = 'none';
    return;
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    var password = document.getElementById('resetPassword').value;
    var confirm = document.getElementById('resetConfirm').value;
    var btn = form.querySelector('button[type="submit"]');
    msgEl.textContent = '';
    msgEl.className = 'reset-msg';

    if (password !== confirm) {
      msgEl.className = 'reset-msg error';
      msgEl.textContent = "Passwords don't match.";
      return;
    }
    if (password.length < 8) {
      msgEl.className = 'reset-msg error';
      msgEl.textContent = 'Password must be at least 8 characters.';
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = 'updating...'; }

    try {
      var resp = await fetch((typeof API_BASE !== 'undefined' ? API_BASE : '') + '/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: password })
      });
      var data = await resp.json();
      if (resp.ok && data.message) {
        msgEl.className = 'reset-msg success';
        msgEl.textContent = data.message;
        form.querySelector('input').style.display = 'none';
        document.getElementById('resetConfirm').style.display = 'none';
        btn.style.display = 'none';
      } else {
        msgEl.className = 'reset-msg error';
        msgEl.textContent = data.error || 'Something went wrong. Try again.';
      }
    } catch (err) {
      msgEl.className = 'reset-msg error';
      msgEl.textContent = 'Network error. Try again.';
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Update Password'; }
    }
  });
})();
</script>
</body>
</html>
