<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Space+Mono:wght@400;700&amp;family=Caveat:wght@500;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="20" fill="#f7efe5"/>
  <rect x="3" y="3" width="954" height="514" rx="18" fill="none" stroke="#2d1f14" stroke-width="3"/>

  <!-- Headline -->
  <text x="480" y="62" text-anchor="middle" font-family="'Luckiest Guy', cursive" font-size="38" fill="#2d1f14" letter-spacing="0.5">80% of your fantasy edge</text>
  <text x="480" y="104" text-anchor="middle" font-family="'Luckiest Guy', cursive" font-size="38" fill="#d97757" letter-spacing="0.5">is lost before kickoff</text>

  <!-- Subtitle -->
  <text x="480" y="138" text-anchor="middle" font-family="'Caveat', cursive" font-size="22" fill="#5c4a3d">Research Sprawl is killing your edge — and wasting your Sundays.</text>

  <!-- ============ COLUMN 1: Tab Sprawl ============ -->
  <g transform="translate(160, 260)">
    <!-- Tangled knot -->
    <path d="M-40,-30 C-20,-60 20,-50 10,-20 C0,10 -30,5 -15,-15 C0,-35 40,-40 35,-10 C30,20 -10,25 -25,0 C-40,-25 15,-55 30,-25 C45,5 -5,30 -30,10" fill="none" stroke="#c4b5a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M-40,-30 C-20,-60 20,-50 10,-20 C0,10 -30,5 -15,-15 C0,-35 40,-40 35,-10 C30,20 -10,25 -25,0 C-40,-25 15,-55 30,-25 C45,5 -5,30 -30,10" fill="none" stroke="#ede0cf" stroke-width="6" stroke-linecap="round"/>

    <!-- Floating app icons -->
    <!-- FantasyPros-ish -->
    <g transform="translate(-75,-55)">
      <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#5b7fff" stroke="#2d1f14" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="white" font-weight="bold">FP</text>
    </g>
    <!-- Reddit -->
    <g transform="translate(65,-50)">
      <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#e63946" stroke="#2d1f14" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="white" font-weight="bold">r/</text>
    </g>
    <!-- Sleeper -->
    <g transform="translate(-70,25)">
      <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#2ec4b6" stroke="#2d1f14" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="13" fill="white" font-weight="bold">S</text>
    </g>
    <!-- Twitter/X -->
    <g transform="translate(70,20)">
      <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#2d1f14" stroke="#2d1f14" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="white" font-weight="bold">X</text>
    </g>
    <!-- Podcast -->
    <g transform="translate(0,50)">
      <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#8b5cf6" stroke="#2d1f14" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod</text>
    </g>
    <!-- YouTube -->
    <g transform="translate(-50,0)">
      <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#d97757" stroke="#2d1f14" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">YT</text>
    </g>
  </g>

  <!-- Column 1 label -->
  <text x="160" y="380" text-anchor="middle" font-family="'Luckiest Guy', cursive" font-size="20" fill="#2d1f14">Tab Sprawl</text>
  <text x="160" y="404" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#5c4a3d">12 tabs open, 6 podcasts queued,</text>
  <text x="160" y="420" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#5c4a3d">3 Twitter threads half-read</text>

  <!-- Handwritten annotation -->
  <text x="160" y="452" text-anchor="middle" font-family="'Caveat', cursive" font-size="18" fill="#d97757" transform="rotate(-2, 160, 452)">^ this is you on Tuesday night</text>

  <!-- ============ COLUMN 2: Data Gaps ============ -->
  <g transform="translate(480, 260)">
    <!-- Tangled knot with gaps -->
    <path d="M-35,-25 C-10,-55 25,-45 15,-15 C5,15 -25,10 -10,-10 C5,-30 35,-35 30,-5 C25,25 -15,20 -20,5" fill="none" stroke="#c4b5a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M-35,-25 C-10,-55 25,-45 15,-15 C5,15 -25,10 -10,-10 C5,-30 35,-35 30,-5 C25,25 -15,20 -20,5" fill="none" stroke="#ede0cf" stroke-width="6" stroke-linecap="round"/>

    <!-- Scattered stat fragments -->
    <g transform="translate(-60,-50)">
      <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#f7e4d8" stroke="#d97757" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#d97757" font-weight="700">PPG?</text>
    </g>
    <g transform="translate(55,-45)">
      <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#dde4f7" stroke="#5b7fff" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#5b7fff" font-weight="700">TGT%</text>
    </g>
    <g transform="translate(-55,30)">
      <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#d9efec" stroke="#2ec4b6" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#2ec4b6" font-weight="700">ADOT</text>
    </g>
    <g transform="translate(60,25)">
      <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#f5eacc" stroke="#8a7565" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#8a7565" font-weight="700">RZ%</text>
    </g>

    <!-- Question marks floating -->
    <text x="0" y="-40" text-anchor="middle" font-family="'Caveat', cursive" font-size="28" fill="#c4b5a5">?</text>
    <text x="30" y="50" text-anchor="middle" font-family="'Caveat', cursive" font-size="22" fill="#c4b5a5">?</text>
    <text x="-30" y="-5" text-anchor="middle" font-family="'Caveat', cursive" font-size="20" fill="#c4b5a5">?</text>
  </g>

  <!-- Column 2 label -->
  <text x="480" y="380" text-anchor="middle" font-family="'Luckiest Guy', cursive" font-size="20" fill="#2d1f14">Data Gaps</text>
  <text x="480" y="404" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#5c4a3d">Stats scattered across 8 sites.</text>
  <text x="480" y="420" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#5c4a3d">None of them agree.</text>

  <!-- Handwritten annotation -->
  <text x="480" y="452" text-anchor="middle" font-family="'Caveat', cursive" font-size="18" fill="#d97757" transform="rotate(1.5, 480, 452)">^ wait, which PPR scoring?</text>

  <!-- ============ COLUMN 3: Context Loss ============ -->
  <g transform="translate(800, 260)">
    <!-- Tangled knot fraying -->
    <path d="M-30,-20 C-5,-50 30,-40 20,-10 C10,20 -20,15 -5,-5 C10,-25 40,-30 35,0 C30,30 -10,25 -25,5" fill="none" stroke="#c4b5a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M-30,-20 C-5,-50 30,-40 20,-10 C10,20 -20,15 -5,-5 C10,-25 40,-30 35,0 C30,30 -10,25 -25,5" fill="none" stroke="#ede0cf" stroke-width="6" stroke-linecap="round"/>

    <!-- Speech bubbles -->
    <g transform="translate(-65,-50)">
      <rect x="-40" y="-14" width="80" height="26" rx="8" fill="white" stroke="#c4b5a5" stroke-width="1.5"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Caveat', cursive" font-size="13" fill="#5c4a3d">Who was that sleeper?</text>
    </g>
    <g transform="translate(55,-35)">
      <rect x="-44" y="-14" width="88" height="26" rx="8" fill="white" stroke="#c4b5a5" stroke-width="1.5"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Caveat', cursive" font-size="13" fill="#5c4a3d">Was he a buy or sell...</text>
    </g>
    <g transform="translate(-10,45)">
      <rect x="-50" y="-14" width="100" height="26" rx="8" fill="white" stroke="#c4b5a5" stroke-width="1.5"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Caveat', cursive" font-size="13" fill="#5c4a3d">What round was he again?</text>
    </g>
  </g>

  <!-- Column 3 label -->
  <text x="800" y="380" text-anchor="middle" font-family="'Luckiest Guy', cursive" font-size="20" fill="#2d1f14">Context Loss</text>
  <text x="800" y="404" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#5c4a3d">By draft day, you forgot half</text>
  <text x="800" y="420" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#5c4a3d">your research. Panic-pick incoming.</text>

  <!-- Handwritten annotation -->
  <text x="800" y="452" text-anchor="middle" font-family="'Caveat', cursive" font-size="18" fill="#d97757" transform="rotate(-1, 800, 452)">^ narrator: he was a sell</text>

  <!-- Divider lines between columns -->
  <line x1="320" y1="190" x2="320" y2="465" stroke="#c4b5a5" stroke-width="1.5" stroke-dasharray="6,6"/>
  <line x1="640" y1="190" x2="640" y2="465" stroke="#c4b5a5" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- Bottom CTA -->
  <g transform="translate(480, 498)">
    <text x="0" y="0" text-anchor="middle" font-family="'Caveat', cursive" font-size="19" fill="#8a7565">razzle.lol puts it all in one place. no tabs. no guessing. just edge.</text>
  </g>
</svg>