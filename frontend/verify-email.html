<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ede0cf">
<title>Verify Email — Razzle</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Space+Mono:wght@400;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Space+Mono:wght@400;700&family=Caveat:wght@500;600;700&display=swap"></noscript>
<link rel="stylesheet" href="styles.css">
<style>
  .verify-page {
    max-width: 420px;
    margin: 80px auto 0;
    padding: 0 20px 60px;
    text-align: center;
  }
  .verify-card {
    background: var(--bg-card);
    border: 3px solid var(--ink);
    border-radius: 12px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 32px 24px;
  }
  .verify-card h1 {
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--ink);
    margin: 0 0 16px;
  }
  .verify-msg {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--ink);
    min-height: 24px;
  }
  .verify-msg.error { color: #c0392b; }
  .verify-msg.success { color: var(--ink); }
  .verify-link {
    display: inline-block;
    margin-top: 20px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
  }
  .verify-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<noscript><div style="text-align:center;padding:40px;font-family:Space Mono,monospace;color:#2d1f14;"><h2>Razzle needs JavaScript</h2><p>Enable JavaScript to use the fantasy football research lab.</p></div></noscript>
<main class="verify-page" id="main-content">
  <div class="verify-card">
    <h1>Email Verification</h1>
    <div class="verify-msg" id="verifyMsg">verifying your email...</div>
    <a href="/" class="verify-link" id="verifyLink" style="display:none">Go to Razzle</a>
  </div>
</main>

<script src="app.js"></script>
<script>
(function() {
  'use strict';

  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var msgEl = document.getElementById('verifyMsg');
  var linkEl = document.getElementById('verifyLink');

  if (!token) {
    msgEl.className = 'verify-msg error';
    msgEl.textContent = 'Invalid verification link.';
    linkEl.style.display = '';
    return;
  }

  fetch((typeof API_BASE !== 'undefined' ? API_BASE : '') + '/api/auth/verify-email?token=' + encodeURIComponent(token))
    .then(function(resp) { return resp.json().then(function(data) { return { ok: resp.ok, data: data }; }); })
    .then(function(result) {
      if (result.ok && result.data.message) {
        msgEl.className = 'verify-msg success';
        msgEl.textContent = result.data.message;
      } else {
        msgEl.className = 'verify-msg error';
        msgEl.textContent = result.data.error || 'Verification failed.';
      }
      linkEl.style.display = '';
    })
    .catch(function() {
      msgEl.className = 'verify-msg error';
      msgEl.textContent = 'Network error. Please try again.';
      linkEl.style.display = '';
    });
})();
</script>
</body>
</html>
